name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Pack standalone bundle
        run: |
          rm -rf deploy-bundle
          mkdir -p deploy-bundle
          cp -r .next/standalone/. deploy-bundle/
          cp -r .next/static deploy-bundle/.next/static
          cp -r public deploy-bundle/public
          tar -czf italian-fabrics-deploy.tar.gz -C deploy-bundle .

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: italian-fabrics-deploy.tar.gz
          target: /tmp/

      - name: Install and restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -euo pipefail
            APP_DIR=/var/www/italian-fabrics
            mkdir -p "$APP_DIR"
            cd "$APP_DIR"
            find . -mindepth 1 -maxdepth 1 -exec rm -rf {} +
            tar -xzf /tmp/italian-fabrics-deploy.tar.gz
            rm -f /tmp/italian-fabrics-deploy.tar.gz

            cat > ecosystem.config.cjs <<'PM2'
            module.exports = {
              apps: [{
                name: 'italianfabrics',
                script: 'server.js',
                cwd: '/var/www/italian-fabrics',
                env: {
                  NODE_ENV: 'production',
                  PORT: 3001,
                  HOSTNAME: '0.0.0.0',
                  NEXT_PUBLIC_SITE_URL: 'https://italianfabrics.uz'
                }
              }]
            };
            PM2

            pm2 restart italianfabrics 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
